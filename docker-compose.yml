services:
  picprism:
    build: .
    restart: unless-stopped
    ports:
      - "${PICPRISM_PORT:-8080}:${PICPRISM_PORT:-8080}"
    volumes:
      - ./data:/data
    environment:
      PICPRISM_TOKEN: ${PICPRISM_TOKEN}
      PICPRISM_PORT: ${PICPRISM_PORT:-8080}
      PICPRISM_DATA_DIR: ${PICPRISM_DATA_DIR:-/data}
